<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="assets/css/styles.css">
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(', '\\)'], ['$', '$']], displayMath: [['\\[', '\\]']] }, svg: { fontCache: 'global' } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body data-session="SMT-09">
  <header class="site-header compact">
    <nav class="nav-bar" aria-label="主要導覽">
      <a class="brand" href="index.html"><span class="brand-mark">Si</span><span>半導體製程筆記</span></a>
      <div class="nav-links">
        <a href="index.html#sessions">課程地圖</a>
        <a href="#concepts">核心觀念</a>
        <a href="#page-guide">逐頁整理</a>
        <a href="#quiz">測驗</a>
      </div>
    </nav>
  </header>
  <main>
    <section class="lesson-hero" id="lessonHero"></section>
    <section class="content-section" id="overview"></section>
    <section class="content-section" id="studyMap"></section>
    <section class="content-section" id="concepts"></section>
    <section class="content-section" id="diagramBlock"></section>
    <section class="content-section" id="terminology"></section>
    <section class="content-section" id="processFlow"></section>

    <section class="content-section" id="emphasis"></section>

      <div class="toolbar">

        <label class="toggle-line">
          <input id="examOnly" type="checkbox">

          <input id="uncertainOnly" type="checkbox">
          <span>只看需人工確認</span>
        </label>
      </div>
      <div class="page-grid" id="pageGuide"></div>
